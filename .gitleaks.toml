# =====================================================================
# NexusFi — Gitleaks Configuration
#
# Gitleaks scans git history for secrets. Run locally or in CI:
#   gitleaks detect --source . --config .gitleaks.toml
#
# Install: https://github.com/gitleaks/gitleaks#installing
# =====================================================================

title = "NexusFi Secret Scanning Rules"

# Extend the default ruleset
[extend]
useDefault = true

# Custom rules for NexusFi / blockchain keys

[[rules]]
id = "stellar-secret-key"
description = "Stellar/Soroban Secret Key (starts with S, 56 chars)"
regex = '''S[A-Z2-7]{55}'''
tags = ["stellar", "blockchain", "critical"]

[[rules]]
id = "eth-private-key"
description = "Ethereum/EVM Private Key (64 hex chars)"
regex = '''(?i)(private[_-]?key|eth[_-]?key)\s*[:=]\s*['"]?[0-9a-fA-F]{64}['"]?'''
tags = ["ethereum", "blockchain", "critical"]

[[rules]]
id = "chainlink-operator-secret"
description = "Chainlink Operator Secret"
regex = '''(?i)operator[_-]?secret\s*[:=]\s*['"][A-Za-z0-9+/=]{20,}['"]'''
tags = ["chainlink", "critical"]

[[rules]]
id = "nexusfi-api-secret"
description = "NexusFi API Secret Key"
regex = '''(?i)api[_-]?secret[_-]?key\s*[:=]\s*['"][A-Za-z0-9+/=]{16,}['"]'''
tags = ["api", "critical"]

[[rules]]
id = "moonpay-secret-key"
description = "MoonPay Secret Key (sk_test_ or sk_live_)"
regex = '''sk_(test|live)_[A-Za-z0-9]{20,}'''
tags = ["moonpay", "critical"]

[[rules]]
id = "moonpay-webhook-key"
description = "MoonPay Webhook Signing Key"
regex = '''(?i)moonpay[_-]?webhook[_-]?key\s*[:=]\s*['"][A-Za-z0-9+/=]{16,}['"]'''
tags = ["moonpay", "critical"]

# Allow .env.example and docs to contain placeholder patterns
[allowlist]
paths = [
  '''\.env\.example$''',
  '''\.md$''',
  '''\.gitleaks\.toml$''',
  '''pre-commit-secrets\.sh$''',
  '''validate-env\.ts$''',
]
